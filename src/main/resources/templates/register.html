<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Register Employee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow mt-5">

                <div class="card-header text-center">

                    <h2>Employee Registration</h2>

                </div>

                <div class="card-body">

                    <form th:action="@{/saveEmployee}"
                          th:object="${employee}"
                          method="post">

                        <div class="mb-3">

                            <label>Name</label>

                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control"
                                   placeholder="Enter Name">

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input type="email"
                                   th:field="*{email}"
                                   class="form-control"
                                   placeholder="Enter Email">

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input type="password"
                                   th:field="*{password}"
                                   class="form-control"
                                   placeholder="Enter Password">

                        </div>

                        <div class="mb-3">

                            <label>Salary</label>

                            <input type="number"
                                   th:field="*{salary}"
                                   class="form-control"
                                   placeholder="Enter Salary">

                        </div>

                        <div class="mb-3">

                            <label>Department</label>

                            <input type="text"
                                   th:field="*{departmentName}"
                                   class="form-control"
                                   placeholder="Enter Department">

                        </div>

                        <div class="mb-3">

                            <label>Role</label>

                            <select th:field="*{role}"
                                    class="form-select">

                                <option value="">Select Role</option>

                                <option value="ROLE_ADMIN">
                                    ADMIN
                                </option>

                                <option value="ROLE_USER">
                                    USER
                                </option>

                            </select>

                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100">

                                Register

                        </button>

                    </form>

                    <div class="text-center mt-3">

                        <a th:href="@{/login}">
                            Already have account? Login
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
