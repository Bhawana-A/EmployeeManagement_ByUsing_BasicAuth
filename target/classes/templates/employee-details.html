<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Employee Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3 class="text-center">
                        Employee Details
                    </h3>

                </div>

                <div class="card-body">

                    <p>
                        <strong>ID :</strong>

                        <span th:text="${employee.id}"></span>
                    </p>

                    <p>
                        <strong>Name :</strong>

                        <span th:text="${employee.name}"></span>
                    </p>

                    <p>
                        <strong>Email :</strong>

                        <span th:text="${employee.email}"></span>
                    </p>

                    <p>
                        <strong>Salary :</strong>

                        <span th:text="${employee.salary}"></span>
                    </p>

                    <p>
                        <strong>Department :</strong>

                        <span th:text="${employee.departmentName}"></span>
                    </p>

                    <p>
                        <strong>Role :</strong>

                        <span th:text="${employee.role}"></span>
                    </p>

                    <a th:href="@{/user/dashboard}"
                       class="btn btn-dark">

                       Back

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
