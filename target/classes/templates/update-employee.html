<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Update Employee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h3 class="text-center">
                        Update Employee
                    </h3>

                </div>

                <div class="card-body">

                    <form th:action="@{/admin/updateEmployee/{id}(id=${employee.id})}"
                          th:object="${employee}"
                          method="post">

                        <div class="mb-3">

                            <label>Name</label>

                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input type="email"
                                   th:field="*{email}"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input type="text"
                                   th:field="*{password}"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>Salary</label>

                            <input type="number"
                                   th:field="*{salary}"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>Department</label>

                            <input type="text"
                                   th:field="*{departmentName}"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>Role</label>

                            <select th:field="*{role}"
                                    class="form-select">

                                <option value="ROLE_ADMIN">
                                    ADMIN
                                </option>

                                <option value="ROLE_USER">
                                    USER
                                </option>

                            </select>

                        </div>

                        <button type="submit"
                                class="btn btn-warning w-100">

                                Update Employee

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
