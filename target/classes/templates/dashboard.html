<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

<meta charset="UTF-8">
		
<title>Dashboard</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>

<body class="bg-light">

	<!-- Navbar -->

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

		<div class="container-fluid">

			<a class="navbar-brand" href="#"> Employee Management </a>
			
			<a th:href="@{/public/register}" class="btn btn-success ms-auto me-2">
					Add Employee </a>

			<div>

				<form th:action="@{/logout}" method="post">

					<button type="submit" class="btn btn-danger">Logout</button>

				</form>

			</div>

		</div>

	</nav>

	<!-- Dashboard -->

	<div class="container mt-5">

		<div class="card shadow">

			<div class="card-header bg-primary text-white">

				<h3 class="text-center">Employee Dashboard</h3>

			</div>

			<div class="card-body">

				<table class="table table-bordered table-striped">

					<thead class="table-dark">

						<tr>

							<th>ID</th>
							<th>Name</th>
							<th>Email</th>
							<th>Salary</th>
							<th>Department</th>
							<th>Role</th>
							<th sec:authorize="hasRole('ADMIN')">Action</th>

						</tr>

					</thead>

					<tbody>

						<tr th:each="emp : ${employees}">

							<td th:text="${emp.id}"></td>

							<td th:text="${emp.name}"></td>

							<td th:text="${emp.email}"></td>

							<td th:text="${emp.salary}"></td>

							<td th:text="${emp.departmentName}"></td>

							<td th:text="${emp.role}"></td>

							<td sec:authorize="hasRole('ADMIN')"><a
								th:href="@{/admin/updatePage/{id}(id=${emp.id})}"
								class="btn btn-warning btn-sm"> Update </a> <a
								th:href="@{/admin/delete/{id}(id=${emp.id})}"
								class="btn btn-danger btn-sm"> Delete </a></td>

						</tr>

					</tbody>

				</table>

			</div>

		</div>

	</div>

	<script>
		window.onload = function() {

			if (window.history.replaceState) {

				window.history.replaceState(null, null, window.location.href);
			}
		};

		window.onpageshow = function(event) {

			if (event.persisted) {

				window.location.reload();
			}
		};
	</script>


</body>
</html>
